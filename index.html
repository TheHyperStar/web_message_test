<!DOCTYPE html>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

  // Write a message to the message log.
  function sendMessage(message) {
    for(var i = 1; i < 9; i++)
    {
      var cell = document.getElementById("message-line-" + i)
      var cell_prev = document.getElementById("message-line-" + (i-1))

      console.log("message-line-" + i)

      cell_prev.textContent = cell.textContent
    }

    document.getElementById("message-line-8") = message
  }
    
  
  function changeText() {
  // 1. Find the element using its ID
  const paragraph = document.getElementById("my-paragraph");
  
  // 2. Change its text
  paragraph.textContent = "Data successfully updated!";

  
}
  
</script>

<html>
<body>

<h1>My First Heading</h1>
<p>My first paragraph.</p>

<p id="my-paragraph">This is the original text.</p>
<button onclick="changeText()">Click Me</button>

<h2>Messages</h2>
<p id="message-line-0">.</p>
<p id="message-line-1">.</p>
<p id="message-line-2">.</p>
<p id="message-line-3">.</p>
<p id="message-line-4">.</p>
<p id="message-line-5">.</p>
<p id="message-line-6">.</p>
<p id="message-line-7">.</p>
<p id="message-line-8">.</p>

<input type="text" id="message_box" placeholder="Enter a message...">

<script>
  var message_box = document.getElementById("message_box");

  message_box.addEventListener("keydown", function(event){
    if (event.key === 'Enter' && message_box.value != '')
    {
      sendMessage(message_box.value)
      message_box.value = ''
    }
  });
                               
</script>
</body>
</html>
